{% extends 'base.html' %}

{% block content %}
    <h2>{% if form.instance.id %}Edit Note{% else %}Create Note{% endif %}</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Note</button>
    </form>
    <a href="{% url 'note_list' %}">Cancel</a>
{% endblock %}
